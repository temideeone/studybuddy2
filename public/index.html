<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#0d0d1a"/>
  <title>StudyBuddy – Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d0d1a;--card:rgba(255,255,255,0.06);--border:rgba(255,255,255,0.1);
      --text:rgba(255,255,255,0.93);--dim:rgba(255,255,255,0.45);
      --accent:#FFE66D;--red:#FF6B6B;--green:#4ECDC4;
    }
    html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif}
    body{display:flex;flex-direction:column;align-items:center;justify-content:center;
      min-height:100vh;padding:20px;
      background:linear-gradient(135deg,#0d0d1a 0%,#16213e 55%,#0f3460 100%)}

    .orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none}
    .orb1{width:350px;height:350px;top:-80px;right:-60px;background:rgba(195,166,255,0.08)}
    .orb2{width:280px;height:280px;bottom:0;left:-80px;background:rgba(78,205,196,0.07)}

    .brand{text-align:center;margin-bottom:32px}
    .brand-icon{width:64px;height:64px;background:linear-gradient(135deg,#FFE66D,#FF6B6B);
      border-radius:20px;display:flex;align-items:center;justify-content:center;
      font-size:30px;margin:0 auto 12px;box-shadow:0 8px 30px rgba(255,107,107,0.35)}
    .brand-name{font-family:'Fredoka One',cursive;font-size:32px;color:var(--accent)}
    .brand-sub{font-size:14px;color:var(--dim);margin-top:4px}

    .card{width:100%;max-width:420px;background:rgba(255,255,255,0.05);
      border:1px solid var(--border);border-radius:24px;padding:32px;
      backdrop-filter:blur(20px);box-shadow:0 20px 60px rgba(0,0,0,0.4)}

    .tabs{display:flex;background:rgba(0,0,0,0.3);border-radius:14px;padding:4px;margin-bottom:28px}
    .tab{flex:1;padding:10px;text-align:center;border-radius:10px;cursor:pointer;
      font-weight:700;font-size:15px;color:var(--dim);transition:all 0.2s;border:none;background:none}
    .tab.active{background:rgba(255,230,109,0.15);color:var(--accent);
      border:1px solid rgba(255,230,109,0.3)}

    .form{display:flex;flex-direction:column;gap:16px}
    .field label{display:block;font-size:12px;font-weight:700;color:var(--dim);
      text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
    .field input{width:100%;background:rgba(255,255,255,0.07);border:1px solid var(--border);
      border-radius:12px;padding:13px 16px;color:var(--text);font-family:'Nunito',sans-serif;
      font-size:15px;outline:none;transition:border-color 0.2s}
    .field input:focus{border-color:rgba(255,230,109,0.5)}
    .field input::placeholder{color:var(--dim)}

    .submit-btn{width:100%;padding:14px;background:var(--accent);color:#0d0d1a;
      border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-size:16px;
      font-weight:800;cursor:pointer;transition:all 0.2s;margin-top:4px}
    .submit-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(255,230,109,0.4)}
    .submit-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}

    .error-msg{background:rgba(255,107,107,0.12);border:1px solid rgba(255,107,107,0.3);
      color:var(--red);border-radius:10px;padding:10px 14px;font-size:13px;
      display:none;text-align:center}
    .error-msg.show{display:block}

    .success-msg{background:rgba(78,205,196,0.12);border:1px solid rgba(78,205,196,0.3);
      color:var(--green);border-radius:10px;padding:10px 14px;font-size:13px;
      display:none;text-align:center}
    .success-msg.show{display:block}

    .divider{text-align:center;color:var(--dim);font-size:12px;margin:4px 0}
    .footer-note{text-align:center;margin-top:20px;font-size:12px;color:var(--dim)}

    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
    .shake{animation:shake 0.3s ease}
  </style>
</head>
<body>
<div class="orb orb1"></div><div class="orb orb2"></div>

<div class="brand">
  <div class="brand-icon">🤖</div>
  <div class="brand-name">StudyBuddy</div>
  <div class="brand-sub">Your AI Homework Helper</div>
</div>

<div class="card">
  <div class="tabs">
    <button class="tab active" id="tab-signin" onclick="switchTab('signin')">Sign In</button>
    <button class="tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
  </div>

  <!-- SIGN IN -->
  <div id="form-signin">
    <div class="form">
      <div class="field">
        <label>Email</label>
        <input type="email" id="si-email" placeholder="your@email.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="si-password" placeholder="Enter your password" autocomplete="current-password"/>
      </div>
      <div class="error-msg" id="si-error"></div>
      <button class="submit-btn" id="si-btn" onclick="signIn()">Sign In →</button>
    </div>
  </div>

  <!-- SIGN UP -->
  <div id="form-signup" style="display:none">
    <div class="form">
      <div class="field">
        <label>Username</label>
        <input type="text" id="su-username" placeholder="Choose a username" autocomplete="username"/>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="su-email" placeholder="your@email.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="su-password" placeholder="At least 6 characters" autocomplete="new-password"/>
      </div>
      <div class="error-msg" id="su-error"></div>
      <div class="success-msg" id="su-success"></div>
      <button class="submit-btn" id="su-btn" onclick="signUp()">Create Account →</button>
    </div>
  </div>

  <div class="footer-note">📐 Math · 🔬 Science · 📚 English · 🏛️ History</div>
</div>

<script>
  // Redirect if already logged in
  if (localStorage.getItem('sb_token')) window.location.href = '/app';

  function switchTab(tab) {
    document.getElementById('form-signin').style.display = tab === 'signin' ? 'block' : 'none';
    document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none';
    document.getElementById('tab-signin').className = 'tab' + (tab === 'signin' ? ' active' : '');
    document.getElementById('tab-signup').className = 'tab' + (tab === 'signup' ? ' active' : '');
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg; el.classList.add('show');
    el.parentElement.classList.add('shake');
    setTimeout(() => el.parentElement.classList.remove('shake'), 300);
  }
  function hideError(id) { document.getElementById(id).classList.remove('show'); }

  async function signIn() {
    hideError('si-error');
    const email    = document.getElementById('si-email').value.trim();
    const password = document.getElementById('si-password').value;
    if (!email || !password) return showError('si-error', 'Please fill in all fields');

    const btn = document.getElementById('si-btn');
    btn.disabled = true; btn.textContent = 'Signing in…';

    try {
      const res  = await fetch('/api/signin', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) return showError('si-error', data.error);
      localStorage.setItem('sb_token', data.token);
      localStorage.setItem('sb_username', data.username);
      window.location.href = '/app';
    } catch {
      showError('si-error', 'Connection error. Please try again.');
    } finally {
      btn.disabled = false; btn.textContent = 'Sign In →';
    }
  }

  async function signUp() {
    hideError('su-error');
    document.getElementById('su-success').classList.remove('show');
    const username = document.getElementById('su-username').value.trim();
    const email    = document.getElementById('su-email').value.trim();
    const password = document.getElementById('su-password').value;
    if (!username || !email || !password) return showError('su-error', 'Please fill in all fields');

    const btn = document.getElementById('su-btn');
    btn.disabled = true; btn.textContent = 'Creating account…';

    try {
      const res  = await fetch('/api/signup', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ username, email, password }),
      });
      const data = await res.json();
      if (!res.ok) return showError('su-error', data.error);
      localStorage.setItem('sb_token', data.token);
      localStorage.setItem('sb_username', data.username);
      window.location.href = '/app';
    } catch {
      showError('su-error', 'Connection error. Please try again.');
    } finally {
      btn.disabled = false; btn.textContent = 'Create Account →';
    }
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('form-signup').style.display !== 'none') signUp();
    else signIn();
  });
</script>
</body>
</html>
